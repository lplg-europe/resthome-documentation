# Documentation utilisateur Resthome — Material for MkDocs (bilingue FR/NL).
#
#   Aperçu local :   pip install -r requirements.txt  &&  mkdocs serve
#   Build statique : mkdocs build                     (sortie dans ./site)
#
# Ce dépôt est PUBLIC (doc utilisateur). Le contenu technique et la propriété
# intellectuelle restent privés et ne sont pas publiés ici.

site_name: Resthome docs
site_url: https://www.lplg.eu/resthome/documentation/
site_description: >-
  Documentation utilisateur du logiciel Resthome pour maisons de repos et de
  soins (MR/MRS) — éditée par LPLG.
site_author: LPLG
copyright: >-
  © LPLG — Documentation sous licence
  <a href="https://creativecommons.org/licenses/by/4.0/deed.fr">CC BY 4.0</a>.

repo_url: https://github.com/lplg-europe/resthome-documentation
repo_name: lplg-europe/resthome-documentation
edit_uri: edit/main/docs/

# La « bulle » LPLG de l'en-tête (= le logo) ramène à la page Resthome du site.
extra:
  homepage: https://www.lplg.eu/resthome

theme:
  name: material
  custom_dir: overrides
  language: fr
  logo: assets/mark.svg
  favicon: assets/favicon.svg
  # Polices de marque LPLG (Assistant + Source Sans Pro) importées via
  # assets/extra.css ; on désactive le chargement Roboto de Google Fonts.
  font: false
  icon:
    repo: fontawesome/brands/github
  palette:
    # Les couleurs LPLG (bleu #0F43FF) sont définies dans assets/extra.css ;
    # on n'attribue donc pas de « primary/accent » nommé ici.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-4
        name: Passer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-7
        name: Passer en mode clair
  features:
    # navigation.instant est volontairement DÉSACTIVÉ : il est incompatible
    # avec le sélecteur de langue FR/NL (rechargement complet nécessaire).
    # Pas de navigation.tabs/sections : arborescence repliable à gauche (style
    # docs Odoo, avec flèches d'expansion).
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - content.action.edit

extra_css:
  - assets/extra.css

extra_javascript:
  # Filtre les résultats de recherche selon la langue de la page (l'index i18n
  # est combiné FR+NL ; on masque les résultats de l'autre langue).
  - assets/search-lang-filter.js

hooks:
  # Réécrit les hreflang alternate relatifs (plugin i18n) en URLs absolues,
  # sinon les moteurs les ignorent → version NL mal servie. Voir le fichier.
  - docs-ops/mkdocs_hooks.py

plugins:
  - search:
      lang:
        - fr
        - nl
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: fr
          default: true
          name: Français
          build: true
        - locale: nl
          name: Nederlands
          build: true
          nav_translations:
            Accueil: Home
            Premiers pas: Aan de slag
            Le parcours de facturation: Het facturatietraject
            Résidents: Bewoners
            Les admissions (pipeline CRM): De opnames (CRM-pijplijn)
            Gérer un résident: Een bewoner beheren
            L'évaluation Katz: De Katz-evaluatie
            Changement de chambre et transfert: Kamerwissel en overdracht
            "L'état des lieux (entrée et sortie)": De plaatsbeschrijving (intrede en uittrede)
            Le mobilier privé du résident: Het privémeubilair van de bewoner
            Suivi des paiements et décomptes: Betalingen en afrekeningen opvolgen
            Les évaluations gériatriques (hors Katz): De geriatrische evaluaties (naast Katz)
            "Les chambres et l'occupation": De kamers en de bezetting
            "La procédure d'emménagement": De intrekprocedure
            "L'application Suppléments": De app Supplementen
            La note de frais (Annexe 12): De kostennota (Bijlage 12)
            La prise en charge CPAS: De OCMW-tussenkomst
            Praticien responsable et signature des annexes: Verantwoordelijke zorgverlener en ondertekening van de bijlagen
            Le dossier médical du résident: Het medisch dossier van de bewoner
            La base de médicaments SAM: De SAM-geneesmiddelendatabank
            La tournée de distribution des repas: De maaltijdverdeelronde
            Le suivi nutritionnel et la dénutrition: Nutritionele opvolging en ondervoeding
            Documents: Documenten
            Les documents du résident: De documenten van de bewoner
            "La centralisation automatique des pièces jointes": De automatische centralisatie van bijlagen
            Facturation: Facturatie
            "Vue d'ensemble": Overzicht
            Le forfait INAMI (dépendance): Het RIZIV-forfait (afhankelijkheid)
            Facturer un mois, pas à pas: Een maand factureren, stap voor stap
            Les suppléments: De supplementen
            Absences et hospitalisations: Afwezigheden en hospitalisaties
            Départ et décès: Vertrek en overlijden
            Débiteurs alimentaires: Onderhoudsplichtigen
            eHealth: eHealth
            Assurabilité (MDA): Verzekerbaarheid (MDA)
            Erreurs MDA: MDA-fouten
            Facturation électronique (eFact): Elektronische facturatie (eFact)
            Rejets eFact: eFact-weigeringen
            Accords (eAgreement): Akkoorden (eAgreement)
            Accord refusé (eAgreement): Akkoord geweigerd (eAgreement)
            Soins: Zorg
            Prescriptions et médicaments: Voorschriften en geneesmiddelen
            Plans de soins et signes vitaux: Zorgplannen en vitale parameters
            Registres cliniques: Klinische registers
            Repas: Maaltijden
            Menus, régimes et hydratation: Menu's, diëten en hydratatie
            Portail familles et kiosque: Familieportaal en kiosk
            Configuration: Configuratie
            "Réglages généraux (résidents, chambres)": Algemene instellingen (bewoners, kamers)
            "Réglages de facturation (MR/MRS)": Facturatie-instellingen (WZC/RVT)
            Réglages eHealth et eFact: eHealth- en eFact-instellingen
            Réglages des repas et de la nutrition: Instellingen voor maaltijden en voeding
            Réglages des documents: Documentinstellingen
            Glossaire: Woordenlijst
            Site LPLG: LPLG-website
  # Date « Mis à jour le … » en pied de page, lue depuis l'historique git.
  # 0 maintenance ; signal de fraîcheur pour Google et les IA.
  # (doit être défini APRÈS i18n : le plugin lit la variable « locale » qu'i18n injecte.)
  - git-revision-date-localized:
      type: date
      enable_creation_date: false
      fallback_to_build_date: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      permalink_title: Lien vers cette section

